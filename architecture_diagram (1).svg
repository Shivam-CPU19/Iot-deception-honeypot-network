<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Healthcare IoT Deception Honeypot Network Architecture</title>
<desc>Lab architecture showing Kali Linux attacker VM, Ubuntu honeypot VM running Cowrie, and the Host-Only network connecting them, with attack flow and logging pipeline.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="680" height="580" fill="#1a1a2e"/>

<!-- Host-Only Network boundary -->
<rect x="30" y="30" width="620" height="330" rx="16" fill="none" stroke="#444466" stroke-width="1.2" stroke-dasharray="8 4"/>
<text x="50" y="54" font-family="Arial" font-size="12" fill="#888899">Host-Only Network — 192.168.56.x</text>

<!-- Kali Linux VM -->
<rect x="55" y="80" width="180" height="140" rx="12" fill="#3d1a1a" stroke="#D85A30" stroke-width="0.8"/>
<text x="145" y="108" font-family="Arial" font-size="14" font-weight="bold" fill="#F0997B" text-anchor="middle">Kali Linux</text>
<text x="145" y="126" font-family="Arial" font-size="11" fill="#c47a5a" text-anchor="middle">192.168.56.101</text>
<rect x="73" y="140" width="144" height="24" rx="5" fill="#4a2010" stroke="#D85A30" stroke-width="0.4"/>
<text x="145" y="156" font-family="Arial" font-size="11" fill="#F0997B" text-anchor="middle">Hydra brute force</text>
<rect x="73" y="170" width="144" height="24" rx="5" fill="#4a2010" stroke="#D85A30" stroke-width="0.4"/>
<text x="145" y="186" font-family="Arial" font-size="11" fill="#F0997B" text-anchor="middle">Manual SSH sessions</text>

<!-- Arrow Kali to Cowrie -->
<line x1="235" y1="150" x2="313" y2="150" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="274" y="143" font-family="Arial" font-size="11" fill="#888899" text-anchor="middle">SSH :2222</text>

<!-- Ubuntu / Cowrie VM -->
<rect x="315" y="68" width="200" height="270" rx="12" fill="#0d2e25" stroke="#1D9E75" stroke-width="0.8"/>
<text x="415" y="96" font-family="Arial" font-size="14" font-weight="bold" fill="#5DCAA5" text-anchor="middle">Ubuntu Server</text>
<text x="415" y="114" font-family="Arial" font-size="11" fill="#2e8a60" text-anchor="middle">192.168.56.102</text>

<!-- Cowrie inner box -->
<rect x="333" y="130" width="164" height="190" rx="8" fill="#0a2018" stroke="#1D9E75" stroke-width="0.4"/>
<text x="415" y="152" font-family="Arial" font-size="13" font-weight="bold" fill="#5DCAA5" text-anchor="middle">Cowrie Honeypot</text>
<text x="415" y="168" font-family="Arial" font-size="11" fill="#2e8a60" text-anchor="middle">vitals-monitor-04</text>

<rect x="345" y="182" width="140" height="22" rx="5" fill="#0d2e25" stroke="#1D9E75" stroke-width="0.3"/>
<text x="415" y="197" font-family="Arial" font-size="11" fill="#9FE1CB" text-anchor="middle">parse_logs.py</text>
<rect x="345" y="210" width="140" height="22" rx="5" fill="#0d2e25" stroke="#1D9E75" stroke-width="0.3"/>
<text x="415" y="225" font-family="Arial" font-size="11" fill="#9FE1CB" text-anchor="middle">dashboard.py</text>
<rect x="345" y="238" width="140" height="22" rx="5" fill="#0d2e25" stroke="#1D9E75" stroke-width="0.3"/>
<text x="415" y="253" font-family="Arial" font-size="11" fill="#9FE1CB" text-anchor="middle">geo_map.py</text>
<rect x="345" y="266" width="140" height="22" rx="5" fill="#0d2e25" stroke="#1D9E75" stroke-width="0.3"/>
<text x="415" y="281" font-family="Arial" font-size="11" fill="#9FE1CB" text-anchor="middle">cowrie.log / .json</text>
<rect x="345" y="294" width="140" height="22" rx="5" fill="#0d2e25" stroke="#1D9E75" stroke-width="0.3"/>
<text x="415" y="309" font-family="Arial" font-size="11" fill="#9FE1CB" text-anchor="middle">cowrie-env (venv)</text>

<!-- Internet cloud -->
<ellipse cx="580" cy="155" rx="55" ry="34" fill="none" stroke="#444466" stroke-width="0.8" stroke-dasharray="4 3"/>
<text x="580" y="150" font-family="Arial" font-size="11" fill="#666688" text-anchor="middle">Internet</text>
<text x="580" y="166" font-family="Arial" font-size="11" fill="#666688" text-anchor="middle">(NAT)</text>
<line x1="516" y1="155" x2="525" y2="155" stroke="#444466" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

<!-- VirtualBox Host -->
<rect x="30" y="378" width="620" height="58" rx="12" fill="none" stroke="#444466" stroke-width="0.8" stroke-dasharray="5 3"/>
<text x="340" y="403" font-family="Arial" font-size="13" font-weight="bold" fill="#888899" text-anchor="middle">VirtualBox Host — Windows</text>
<text x="340" y="422" font-family="Arial" font-size="11" fill="#555566" text-anchor="middle">NAT adapter for internet · Host-Only adapter for lab network</text>

<!-- Visualizations box -->
<rect x="55" y="460" width="180" height="96" rx="12" fill="#1e1040" stroke="#7F77DD" stroke-width="0.8"/>
<text x="145" y="488" font-family="Arial" font-size="13" font-weight="bold" fill="#AFA9EC" text-anchor="middle">Visualizations</text>
<text x="145" y="506" font-family="Arial" font-size="11" fill="#7F77DD" text-anchor="middle">dashboard.png</text>
<text x="145" y="522" font-family="Arial" font-size="11" fill="#7F77DD" text-anchor="middle">pie_chart.png</text>
<text x="145" y="538" font-family="Arial" font-size="11" fill="#7F77DD" text-anchor="middle">attack_map.html</text>

<!-- GitHub box -->
<rect x="445" y="460" width="180" height="96" rx="12" fill="#0d1e35" stroke="#378ADD" stroke-width="0.8"/>
<text x="535" y="488" font-family="Arial" font-size="13" font-weight="bold" fill="#85B7EB" text-anchor="middle">GitHub Repo</text>
<text x="535" y="506" font-family="Arial" font-size="11" fill="#378ADD" text-anchor="middle">week1–4 folders</text>
<text x="535" y="522" font-family="Arial" font-size="11" fill="#378ADD" text-anchor="middle">scripts + logs</text>
<text x="535" y="538" font-family="Arial" font-size="11" fill="#378ADD" text-anchor="middle">READMEs + screenshots</text>

<!-- Arrow Ubuntu to Visualizations -->
<line x1="355" y1="340" x2="200" y2="460" stroke="#1D9E75" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="255" y="418" font-family="Arial" font-size="11" fill="#888899" text-anchor="middle">generates</text>

<!-- Arrow Ubuntu to GitHub -->
<line x1="475" y1="340" x2="510" y2="460" stroke="#185FA5" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="512" y="418" font-family="Arial" font-size="11" fill="#888899" text-anchor="middle">git push</text>

</svg>
